<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultados de Simulação de Tráfego</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Resultados de Simulação de Tráfego</h1>
    <p class="subtitle">Análise de atraso e fila máxima por hora</p>
  </header>

  <main>
    <section id="controls">
      <label for="sim-selector">Selecione a simulação:</label>
      <select id="sim-selector"></select>
    </section>

    <section id="atraso-section">
      <h2>Atraso Médio por Hora</h2>
      <div class="content-grid">
        <div class="table-container">
          <table id="atraso-table"></table>
          <div id="atraso-media" class="media-badge"></div>
        </div>
        <div class="chart-container">
          <canvas id="atraso-chart"></canvas>
        </div>
      </div>
    </section>

    <section id="fila-section">
      <h2>Fila Máxima por Hora</h2>
      <div class="content-grid">
        <div class="table-container">
          <table id="fila-table"></table>
        </div>
        <div class="chart-container">
          <canvas id="fila-chart"></canvas>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>Estudo de Simulação de Tráfego</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
